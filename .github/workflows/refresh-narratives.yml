name: Narratives refresh

# Generates per-state AI narrative briefings using Claude Haiku.
# Runs weekly (Sunday 14:00 UTC = ~10am ET, after the morning fast tier).
# Uses ANTHROPIC_API_KEY (repo secret). Without the key, the script exits 1
# and the workflow is marked failed so we open an alert issue.
#
# Cost: ~$0.30-0.50 per run for ~30 rated states with Haiku 4.5.

on:
  schedule:
    - cron: '0 14 * * 0'    # Sundays 14:00 UTC
  workflow_dispatch:

concurrency:
  group: refresh-narratives
  cancel-in-progress: false

permissions:
  contents: write
  issues:   write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Generate narratives
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_narratives.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/narratives/
          if git diff --staged --quiet; then
            echo "::notice::no narrative changes"
            exit 0
          fi
          git commit -m "data: narratives refresh $(date -u +%FT%H:%MZ)"
          git pull --rebase -X ours origin main || true
          git push

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const date = new Date().toISOString().slice(0,10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `pipeline-alert: narratives refresh failed (${date})`,
              labels:['pipeline-alert'],
              body: `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
